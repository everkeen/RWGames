<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW Games</title>
    <link rel="stylesheet" href="./static/main.css">
    <script type="module" src="../../dist/main.js"></script>
    <link rel="icon" type="image/png" href="../../static/rwglogo.png">
</head>

<body>
    <header>
        <a href="../../"><img src="../../static/rwglogo.png" alt="RWG Logo" class="pixel-image rwg-logo"
                id="game-icon"></a>
    </header>
    <main>
        <h1>Welcome to <abbr title="Random Web Games">RW Games</abbr></h1>
        <p>Random thing made to make me able to make all my web game ideas
            WITHOUT having to create new repos each time!
            Also lets me manage them all easier
        </p>
        <h2>Games</h2>
        <table class="games-grid">
            <tr>
                <td><a href="./games/powders/">Powders</a></td>
            </tr>
        </table>
        <h2>Other Links</h2>
        <ul class="no-style-list">
            <li><a href="https://github.com/everkeen/RWGames">GitHub Repo</a></li>
        </ul>
        <h2>Counters & Statistics</h2>
        <p>Visit count: <span data-visit-counter>Loading...</span></p>
    </main>
    <footer>
        <p>Report an issue! <a href="https://github.com/everkeen/RWGames/issues">GitHub Issues</a></p>
        <a href="../../"><img src="../../static/rwglogo.png" alt="RWG Logo" class="pixel-image rwg-logo"
                id="footer-game-icon"></a>
    </footer>
</body>

</html>
