<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powders</title>
    <link rel="stylesheet" href="/static/main.css">
    <script type="module">
        import powders from '/dist/powders.js';
        document.getElementById('start-button').addEventListener('click', () => powders.startGame());
    </script>
    <link rel="stylesheet" href="/static/powders.css">
</head>

<body>
    <div style="display: none;" id="debug-info">
        <p id="dbg-mouse-pos">?,?</p>
        <p id="dbg-particle-info">No particle</p>
    </div>
    <div id="game-container" class="game-canvas-container">
        <canvas id="game-canvas" class="game-canvas pixel-image canvas-aspect" width="75" height="56"></canvas>
    </div>
    <button id="start-button">Start Game</button>
    <div id="tool-picker"><ul class="types-list category-types-list" id="tools-list"></ul></div>
    <div id="element-picker">
        <ul class="types-list" id="categories-list"></ul>
        <div id="category-display"></div>
    </div>
</body>

</html>
